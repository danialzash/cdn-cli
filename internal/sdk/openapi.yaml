    CustomerDomain:
      type: object
      description: A customer domain (CNAME-setup) attached to a provider domain.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          format: hostname
        domain:
          type: string
          format: hostname
        status:
          type: string
          enum: [initializing, active, pending, moved]
        certificate_status:
          type: string
          enum: [valid, pending, failed, unprocessed]
          description: |
            Derived SSL certificate lifecycle status for the customer domain.
            `valid` when an active edge certificate exists; `pending` when the domain is active and
            a managed edge order is in progress; `failed` when the domain is active with no active
            certificate and no in-progress edge order; `unprocessed` when the domain is not active
            and no active certificate exists.
        certificate_expiry_date:
          type: string
          format: date-time
          nullable: true
          description: |
            Expiry date of the active edge certificate. Present only when `certificate_status` is
            `valid`; otherwise `null`.
        type:
          type: string
          description: Always `partial` for customer domains (they use CNAME setup).
          enum: [partial]
        provider_domain:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              format: hostname
        cname_target:
          type: string
          format: hostname
          nullable: true
          description: |
            The hostname customers must add as a CNAME record on `domain` for the domain to become
            active. Resolves to the configured upstream (provider apex or one of its records).
        upstream:
          type: string
          format: hostname
          nullable: true
          description: |
            The hostname the customer's CNAME will target. `null` means the provider apex.
        protocol:
          type: string
          enum: [auto, http, https]
          description: |
            Edge-to-origin connection protocol for this customer domain. On create, when not
            supplied explicitly, this matches the provider domain's load balancing protocol.
        ssl:
          $ref: "#/components/schemas/Ssl"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomerDomainStore:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string
          format: hostname
          description: Customer-owned domain name to register it should be a partial domain(e.g. `app.tenant.example`).
        upstream:
          type: string
          format: hostname
          nullable: true
          description: |
            Optional upstream host the customer's CNAME will target. When omitted, defaults to the
            provider apex. When supplied, must be either the provider apex or `<record>.<provider>`
            where `<record>` is a cloud-compatible DNS record (A / AAAA / CNAME / ANAME) that
            already exists in the provider zone.
        protocol:
          type: string
          enum: [auto, http, https]
          description: |
            Optional edge-to-origin protocol. When omitted, inherits the provider domain's
            load balancing protocol.
        ssl:
          $ref: "#/components/schemas/CustomerDomainSslInput"
    CustomerDomainUpdate:
      type: object
      properties:
        upstream:
          type: string
          format: hostname
          nullable: true
          description: |
            New upstream host. Same validation as on create. Omitting the field leaves the current
            upstream unchanged; sending `null` resets it to the provider apex.
        protocol:
          type: string
          enum: [auto, http, https]
          description: |
            New edge-to-origin protocol. Same validation as on create. Omitting the field leaves
            the current protocol unchanged.
        ssl:
