      type: object
      properties:
        rule_id:
          type: string
          format: uuid
          description: ID of the rule you want to move
        after_rule_id:
          type: string
          format: uuid
          description: ID of the rule you want to be prior to the selected rule
        before_rule_id:
          type: string
          format: uuid
          description: ID of the rule you want to follow the selected rule
      required: [rule_id]
    PrioritizePoolAfter:
