openapi: 3.0.0
info:
  title: VergeCloud CDN Services
  version: 1.168.2
  x-logo:
    url: "https://www.vergecloud.com/wp-content/uploads/2025/01/VergeCloud-Logo.svg"
    backgroundColor: "white"
    altText: "VergeCloud"

servers:
  - url: https://api.vergecloud.com/v1
    description: Production server (uses live data)

security:
  - UserToken: []
  - ApiKey: []

paths:
  # Domains
  /domains:
    get:
      summary: Get the list of domains
      description: Leaving the 'search' empty, will return all domains. Otherwise, it will filter domains containing the search keyword.
      operationId: domains.index
      tags: [Domain]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Statuses"
        - $ref: "#/components/parameters/Sort_by"
        - $ref: "#/components/parameters/Order"
        - $ref: "#/components/parameters/AggregatedReport"
      responses:
        200:
          description: Lists all domains belongs to the organization
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Domain"
        401:
          $ref: "#/components/responses/UnauthorizedError"
    post:
      summary: Create new domain
      description: |
        Registers a new domain (or subdomain) under the authenticated organization. Pass `domain_type=full`
        for apex/zone delegation via NS keys, or `partial` for subdomain onboarding via CNAME Setup.
        On success, the domain is provisioned in `pending` state and default DNS records, NS keys,
        and CNAME targets are generated automatically.
      operationId: domains.store
      tags: [Domain]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainStore"
      responses:
        201:
          description: Successfully created the new domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /domains/{domain}:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Get information of the domain
      operationId: domains.show
      tags: [Domain]
      responses:
        200:
          description: Detailed information of the domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    delete:
      summary: Remove the domain
      description: |
        Permanently removes the domain from the organization. The query parameter `id` must match the
        target domain's UUID as a safety check to prevent accidental deletion. All related
        configuration (DNS records, page rules, WAF/DDoS rules, certificates, etc.) is also
        deleted; this action cannot be undone.
      operationId: domains.destroy
      tags: [Domain]
      parameters:
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          required: true
      responses:
        200:
          description: Successfully deleted the domain
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /domains/{domain}/clone:
    parameters:
      - $ref: "#/components/parameters/Domain"
    post:
      summary: Clone a domain config from another one
      description: |
        Copies configuration (caching, page rules, firewall, WAF, rate limit, SSL, DNS, etc.) from
        a source domain to the target `{domain}` in the path. You select which configuration
        sections to clone via the request body; existing settings on the target domain are
        overwritten for the chosen sections.
      operationId: domains.clone
      tags: [Domain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneDomain"
      responses:
        200:
          $ref: "#/components/responses/OK"
        400:
          $ref: "#/components/responses/Error"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/ns-keys:
    parameters:
      - $ref: "#/components/parameters/Domain"
    put:
      summary: Set custom NS records for the domain
      description: |
        Overrides the default VergeCloud nameservers assigned to the domain with a custom pair
        provided in the request body. Both NS values must be valid hostnames; until the user
        updates their registrar to point to these new NS keys, the domain remains in `pending`
        state and traffic is not routed through VergeCloud.
      operationId: domains.nameservers.set
      tags: [Domain]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NsKeys"
      responses:
        200:
          description: Successfully set custom NS values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NsKeysResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/Error"
    delete:
      summary: Reset custom Nameserver keys to the default values for the domain
      description: |
        Discards any defined NS keys for the domain and reverts them to the organization's default
        VergeCloud nameservers. After resetting, the registrar must be updated to use the new NS
        values; the domain status will move back to `pending` until verification succeeds.
      operationId: domains.nameservers.reset
      tags: [Domain]
      responses:
        200:
          description: Successfully reset to deafult NS values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NsKeysResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/Error"
  /domains/{domain}/ns-keys/check:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Check NS to find whether domain is activated
      description: |
        Performs a live DNS lookup to compare the domain's currently published NS records with the
        assigned `ns_keys`. Returns both sets so the caller can confirm the registrar
        has been updated; once they match, the domain transitions to `active`.
      operationId: domains.nameservers.check
      tags: [Domain]
      responses:
        200:
          description: Successfully retrieve list of NS values
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataWithMessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/NsDomain"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/dns-service/check-ns:
    parameters:
      - $ref: "#/components/parameters/Domain"
    put:
      deprecated: true
      summary: Deprecated in favor /ns-keys/check
      description: |
        **Deprecated.** Legacy alias that queues an asynchronous NS verification check. New
        integrations should use `GET /domains/{domain}/ns-keys/check`, which performs the same
        check synchronously and returns identical data.
      operationId: domains.nameservers.deprecated-check
      tags: [Domain]
      parameters:
        - $ref: "#/components/parameters/Domain"
      responses:
        200:
          description: Successfully queued checking domain's NS
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataWithMessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DeprecatedNs"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/ns-keys/use-optional-keys:
    parameters:
      - $ref: "#/components/parameters/Domain"
    post:
      summary: Use optional NS keys
      description: |
        Switches the domain to a secondary (optional) pair of nameservers reserved for the organization.
        This is useful when the primary NS keys conflict with another registration or the customer
        wants to migrate without taking the domain offline; the new NS values are returned in the
        response and must be configured at the registrar.
      tags: [Domain]
      operationId: domains.nameservers.optional
      responses:
        200:
          description: Optional keys are set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NsKeysResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/ns-keys/default:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Get the domain organization default NS keys
      description: |
        Returns the organization-level default NS values that VergeCloud will assign whenever the
        domain's custom NS configuration is reset. Useful for displaying the fallback nameservers
        in onboarding wizards before commiting to a custom setup.
      operationId: domains.nameservers.default
      tags: [Domain]
      responses:
        200:
          description: Successfully retrieved the account-level default NS values
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NsKeysResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/cname-setup/custom:
    parameters:
      - $ref: "#/components/parameters/Domain"
    put:
      summary: Set a custom record for using CNAME Setup
      operationId: domains.cname-setup.set
      tags: [Domain]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomCname"
      responses:
        200:
          description: Successfully updated the custom cname record of the domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      summary: Reset the custom record of CNAME Setup to the default value
      operationId: domains.cname-setup.reset
      tags: [Domain]
      responses:
        200:
          description: Successfully updated the custom cname record of the domain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  # /domains/{domain}/cname-setup/convert:
  #   parameters:
  #     - $ref: "#/components/parameters/Domain"
  #   post:
  #     summary: Convert domain setup to cname
  #     operationId: domains.cname-setup.convert
  #     tags: [Domain]
  #     responses:
  #       200:
  #         description: Successfully converted the domain to use CNAME Setup
  #         content:
  #           application/json:
  #             schema:
  #               $ref: "#/components/schemas/DomainResponse"
  #       401:
  #         $ref: "#/components/responses/UnauthorizedError"
  #       422:
  #         $ref: "#/components/responses/UnprocessableEntityError"
  /domains/{domain}/cname-setup/check:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Check Cname Setup to find whether domain is activated
      description: |
        Performs a live CNAME lookup for the domain and verifies that it resolves to the expected
        custom CNAME target (`cname_target`). Domains in `partial` mode become `active` once the
        record is correctly published.
      operationId: domains.cname-setup.check
      tags: [Domain]
      responses:
        200:
          description: Successfully converted the domain to use CNAME Setup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /domains/{domain}/cname-setup/default:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Get the domain organization default custom CNAME
      description: |
        Returns the organization-level default custom CNAME hostname used as the fallback target for
        any domain running CNAME Setup under this organization. Helpful for showing the default
        target before customizing it via `PUT /cname-setup/custom`.
      operationId: domains.cname-setup.default
      tags: [Domain]
      responses:
        200:
          description: Successfully retrieved the account-level default custom CNAME
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountCustomCnameResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  # Customer Domains
  /customer-domains/{domain}:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: List customer domains
      description: |
        Returns the customer domains attached to the given provider domain.
        Leaving `search` empty returns every customer domain; otherwise the list is filtered by
        hostnames containing the search keyword.
      operationId: customer_domains.index
      tags: [Customer Domain]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Sort_by"
        - $ref: "#/components/parameters/Order"
      responses:
        200:
          description: Paginated list of customer domains
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CustomerDomain"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Create new customer domain
      description: |
        Creates a new customer domain (always `type=partial`, i.e. CNAME setup) under the provider
        domain. `upstream` is the hostname the customer's CNAME record will point at and must be
        either the provider apex or `<record>.<provider>` where `<record>` is a cloud-compatible
        DNS record (A / AAAA / CNAME / ANAME) that already exists in the provider domain. When
        omitted, `upstream` defaults to the provider apex.
      operationId: customer_domains.store
      tags: [Customer Domain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerDomainStore"
      responses:
        201:
          description: Customer domain created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /customer-domains/{domain}/{customerDomain}:
    parameters:
      - $ref: "#/components/parameters/Domain"
      - name: customerDomain
        in: path
        required: true
        description: Customer domain hostname
        schema:
          type: string
          format: hostname
          example: subdomain.customer.com
    get:
      summary: Get customer domain details
      operationId: customer_domains.show
      tags: [Customer Domain]
      responses:
        200:
          description: Customer domain details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    patch:
      summary: Update customer domain
      description: |
        Updates the upstream and/or writable SSL settings of a customer domain.
      operationId: customer_domains.update
      tags: [Customer Domain]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerDomainUpdate"
      responses:
        200:
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerDomainResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      summary: Delete customer domain
      description: Delete a customer domain attached to the given provider domain.
      operationId: customer_domains.delete
      tags: [Customer Domain]
      parameters:
        - name: id
          in: query
          required: true
          description: Must equal the target customer domain id (same safety pattern as `DELETE domain`).
          schema:
            type: string
            format: uuid
      responses:
        200:
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  # DNS
  /dns/{domain}/records:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Get list of DNS records
      operationId: dns-records.index
      tags: [DNS Management]
      parameters:
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/DnsRecordType"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PerPage"
      responses:
        200:
          description: Successfully retrieved list of DNS records
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DnsRecordGeneric"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Create new DNS record
      operationId: dns-records.store
      tags: [DNS Management]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsRecord"
      responses:
        201:
          description: Successfully created new DNS record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsRecordResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"

  /dns/{domain}/records/{id}:
    parameters:
      - $ref: "#/components/parameters/Domain"
      - $ref: "#/components/parameters/DnsRecordId"
    get:
      summary: Get information of a record
      operationId: dns-records.show
      tags: [DNS Management]
      responses:
        200:
          description: Successfully retrieved the record's information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsRecordData"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    put:
      summary: Update a DNS record
      operationId: dns-records.update
      tags: [DNS Management]
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsRecord"
      responses:
        200:
          description: Successfully updated the record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsRecordResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      summary: Remove a DNS record
      operationId: dns-records.destroy
      tags: [DNS Management]
      responses:
        200:
          description: Successfully removed the record
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /dns/{domain}/records/{id}/cloud:
    put:
      summary: Toggle cloud status (To proxy or not proxy, that's the question!)
      operationId: dns-records.cloud
      tags: [DNS Management]
      parameters:
        - $ref: "#/components/parameters/Domain"
        - $ref: "#/components/parameters/DnsRecordId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DnsRecordCloud"
      responses:
        200:
          description: Successfully updated cloud status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsRecordResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /dns/{domain}/records/import:
    post:
      summary: Import DNS records using BIND file
      operationId: dns-records.import
      tags: [DNS Management]
      parameters:
        - $ref: "#/components/parameters/Domain"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/DnsRecordImport"
      responses:
        200:
          description: Successfully imported DNS records
          $ref: "#/components/responses/OK"
  /dns/{domain}/records/export:
    get:
      summary: Export DNS records using BIND file
      operationId: dns-records.export
      tags: [DNS Management]
      parameters:
        - $ref: "#/components/parameters/Domain"
      responses:
        200:
          description: Successful
          content:
            text/plain:
              schema:
                type: string
                format: binary
  # Secondary-DNS
  /secondary-dns/{domain}:
    get:
      summary: Get Secondary DNS Settings
      operationId: domains.secondary_dns.show
      tags: [Secondary DNS]
      parameters:
        - $ref: "#/components/parameters/Domain"
      responses:
        200:
          description: Successfully retrieved Secondary DNS Settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataWithMessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SecondaryDNSData"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Update Secondary DNS Settings
      tags: [Secondary DNS]
      operationId: domains.secondary_dns.store
      parameters:
        - $ref: "#/components/parameters/Domain"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecondaryDNSData"
      responses:
        200:
          description: Successfully updated Secondary DNS Settings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/DataWithMessageResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SecondaryDNSData"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    delete:
      summary: Delete Secondary DNS Settings
      tags: [Secondary DNS]
      operationId: domains.secondary_dns.remove
      parameters:
        - $ref: "#/components/parameters/Domain"
      responses:
        204:
          description: Successfully deleted Secondary DNS Settings
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  # Host header whitelist
  /host-header-whitelists/{domain}:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: Get Host header whitelist state
      description: >-
        Returns whether the domain is on the **global** Host allowlist, and the list of **per–target organization**
        IDs that may use this domain (or its registrable root) as HTTP `Host`.
      operationId: domains.host_header_whitelists.index
      tags: [Host Header Whitelist]
      responses:
        200:
          description: Current whitelist state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostHeaderWhitelistTargetOrganizationsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Add per-organization Host header whitelist entry
      description: >-
        Whitelists a **target** CDN organization so it may use this domain as `Host` for HTTP requests.
        This is not available while the domain is on the **global** Host allowlist (`422` on `domain`).
        **Rate limited to 30 requests per minute on target_account**
      operationId: domains.host_header_whitelists.store
      tags: [Host Header Whitelist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostHeaderWhitelistStoreRequest"
      responses:
        200:
          description: Whitelist state after the change
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostHeaderWhitelistTargetOrganizationsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /host-header-whitelists/{domain}/settings:
    parameters:
      - $ref: "#/components/parameters/Domain"
    put:
      summary: Set global Host header allowlist for this domain
      description: >-
        When `global` is `true`, the domain is added to the **global** Host allowlist (any account may use it as HTTP
        `Host` for requests). When `false`, the global entry is removed. This endpoint does not modify the underlying
        per–organization whitelist rows.
      operationId: domains.host_header_whitelists.settings
      tags: [Host Header Whitelist]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostHeaderWhitelistSettingsRequest"
      responses:
        200:
          description: Whitelist state after the change
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostHeaderWhitelistTargetOrganizationsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /host-header-whitelists/{domain}/{target_account}:
    parameters:
      - $ref: "#/components/parameters/Domain"
      - $ref: "#/components/parameters/HostHeaderWhitelistTargetOrganization"
    delete:
      summary: Remove per-organization Host header whitelist entry
      description: >-
        Removes this domain from the whitelist for the given target CDN account.
        **Rate limited to 30 requests per minute on target_account**
      operationId: domains.host_header_whitelists.remove
      tags: [Host Header Whitelist]
      responses:
        200:
          description: Whitelist state after the change
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostHeaderWhitelistTargetOrganizationsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          description: Domain or whitelist row not found, or the domain was not whitelisted for this target account
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/MessageResponse"
                  - $ref: "#/components/schemas/HostHeaderWhitelistRemoveNotFoundResponse"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"

