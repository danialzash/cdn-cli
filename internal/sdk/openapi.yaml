  # Dynamic Fields
  /lists:
    get:
      summary: Get the list of Lists
      description: |
        Returns the lists available to the caller.

        Lists are reusable collections of values that can be referenced from
        firewall rules (custom WAF rules) to match requests by client identity.
        Two kinds of lists are supported, distinguished by the `type` field:

        - **IP lists** — when `type` is `ip`, the list stores IPv4/IPv6
          addresses (or CIDR ranges) and is used to match the source IP of
          incoming requests in a custom WAF rule.
        - **JA3 lists** — when `type` is `bytes`, the list stores JA3 TLS client fingerprints and is used
          to match clients by their TLS handshake signature in a firewall rule (custom WAF rule).
      tags: [List]
      operationId: lists.index
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/DynamicFieldScope"
        - $ref: "#/components/parameters/DynamicFieldType"
        - $ref: "#/components/parameters/DynamicFieldName"
      responses:
        200:
          description: Successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/DynamicField"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Store new List
      description: |
        Creates a new private list for your organization. Use `type: ip` to
        create an IP list or `type: bytes` to create a JA3 list. The list can
        then be referenced from firewall rules (custom WAF rules) to match
        requests by source IP or JA3 fingerprint.

        Newly created lists are always `private` and only visible to members
        of your organization.
      tags: [List]
      operationId: lists.store
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DynamicField"
      responses:
        201:
          description: Successfully created List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DynamicFieldResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /lists/{id}:
    parameters:
      - $ref: "#/components/parameters/Id"
    get:
      summary: Get an existing List
      description: |
        Returns a single list together with its items. The list can be a
        `public` list (visible to everyone) or a `private` list owned by your
        organization. The `type` field indicates whether it is an IP list
        (`ip`) or a JA3 list (`bytes`).
      operationId: lists.show
      tags: [List]
      responses:
        200:
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DynamicFieldData"
    patch:
      deprecated: true
      summary: Update an existing List
      description: |
        Updates a private list owned by your organization. Public lists
        cannot be updated. Updating a list that is still referenced by a
        firewall rule (custom WAF rule) may cause those rules to stop matching the intended
        traffic.
      tags: [List]
      operationId: lists.update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DynamicFieldUpdateRequest"
      responses:
        200:
          description: Successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DynamicFieldResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      summary: Delete List
      description: |
        Deletes a private list owned by your organization. Public lists
        cannot be deleted. Deleting a list that is still referenced by a
        firewall rule (custom WAF rule) may cause those rules to stop matching the intended
        traffic.
      tags: [List]
      operationId: lists.destroy
      responses:
        200:
          description: Deleted successfully
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /lists/{id}/items:
    post:
      summary: Add new items to the list
      description: |
        Appends one or more values to a private list. For an IP list
        (`type: ip`) each value must be an IPv4/IPv6 address or CIDR range;
        for a JA3 list (`type: bytes`) each value must be a JA3 fingerprint.
        Items added here become immediately available to any firewall (custom WAF rule)
        that references this list.
      tags: [List]
      operationId: lists.items.store
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                values:
                  type: array
                  items:
                    $ref: "#/components/schemas/DynamicFieldValue"
      responses:
        201:
          description: Added successfully
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /lists/{id}/items/{item_id}:
    delete:
      summary: Delete an item from the list
      description: |
        Removes a single value from a private list. Any firewall rule (custom WAF rule) that
        references this list will stop matching the removed value on
        subsequent requests.
      tags: [List]
      operationId: lists.items.destroy
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: item_id
          in: path
          schema:
            type: string
            format: uuid
          required: true
      responses:
        200:
          description: Deleted successfully
          $ref: "#/components/responses/OK"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
