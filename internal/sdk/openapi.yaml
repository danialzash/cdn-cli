    DomainClaim:
      type: object
      readOnly: true
      properties:
        id:
          format: uuid
          type: string
        domain:
          type: string
          format: hostname
          description: name of claimed domain
        ns_keys:
          description: Desired NS values for the domain
          type: array
          items:
            type: string
            format: hostname
          minItems: 2
          maxItems: 2
          example:
            - "h.ns.example.com"
            - "s.ns.example.com"
        status:
          type: string
          enum:
            - PENDING
            - EXPIRED
            - VERIFIED
            - TRANSFERRED
            - SUSPENDED
          description: |
            - PENDING: The domain claim is pending verification and waiting to set nameservers in the registrar.
            - EXPIRED: The pending status has a time limit and if not verified within that limit, it becomes expired.
            - VERIFIED: The system has successfully checked that the nameservers are set to ns_keys.
            - SUSPENDED: The current domain owner has contacted support and suspended the automatic claim. The claimer should contact support in this situation.
            - TRANSFERRED: The domain has been verified, the ownership transfer period is complete, and the domain has been successfully transferred to the claimer.
        updated_at:
          type: string
          format: date-time
    DomainClaimRequest:
      type: object
      properties:
        domain:
          type: string
          format: hostname
          description: name of claiming domain
    Domain:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        account_id:
          type: string
          format: uuid
        user_id:
          deprecated: true
          description: "Deprecated: Please use 'account_id' instead."
          type: string
          format: uuid
        domain:
          type: string
          format: hostname
          deprecated: true
          description: Deprecated in favor of name attribute
        name:
          type: string
          format: hostname
        ns_keys:
          description: Desired NS values for the domain
          type: array
          items:
            type: string
            format: hostname
          minItems: 2
          maxItems: 2
        current_ns:
          description: Current NS values for the domain
          type: array
          items:
            type: string
            format: hostname
          minItems: 2
          maxItems: 2
        cname_target:
          description: Current record for CNAME Setup of the domain
          type: string
          format: hostname
          nullable: true
        custom_cname:
          description: Domain's custom record for CNAME Setup
          type: string
          format: hostname
          nullable: true
        type:
          description: Partial domain is using CNAME Setup and full domain is using NS Setup
          type: string
          enum:
            - full
            - partial
        status:
          type: string
          enum:
            - initializing
            - pending
            - active
            - moved
        dns_cloud:
          type: boolean
          default: false
        restriction:
          type: array
          items:
            type: string
            enum:
              - paused
              - suspended
              - unfair
              - charged
        transfer:
          $ref: "#/components/schemas/DomainTransferData"
        fingerprint_status:
          type: boolean
          default: false
          readOnly: true
        created_at:
          type: string
          format: date-time
