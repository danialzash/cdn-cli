          properties:
            "en":
              type: object
              properties:
                name:
                  type: string
            "fa":
              type: object
              properties:
                name:
                  type: string
        applications:
          type: array
          maxItems: 10
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                readOnly: true
              slug:
                type: string
              name:
                type: string
              description:
                type: string
              logo:
                type: string
    CloneDomain:
      type: object
      required:
        - from
      properties:
        from:
          type: string
          format: hostname
    BypassAction:
      type: object
      properties:
        rlimit:
          type: boolean
        challenge:
          type: boolean
        waf:
          type: boolean
    ChallengeAction:
      type: object
      properties:
        mode:
          type: integer
          enum: [1, 2, 3]
          "description": "The mode of mitigation (1: Cookie, 2: Javascript, 3: Captcha)"
        ttl:
          type: integer
          minimum: 10
          maximum: 31536000
        https_only:
          type: boolean
    FirewallTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
        category:
          type: string
        regular_expression:
          type: string
          description: Wireshark display filter / firewall filter expression
        action:
          type: string
          enum: [allow, deny, challenge, bypass]
        action_details:
          description: |
            Shape depends on `action`:
              * `allow` / `deny`: an empty object `{}`
              * `challenge`: see `ChallengeAction`
              * `bypass`: see `BypassAction`
          oneOf:
            - type: object
              additionalProperties: false
            - $ref: "#/components/schemas/ChallengeAction"
            - $ref: "#/components/schemas/BypassAction"
        meta:
          $ref: "#/components/schemas/FirewallTemplateMeta"
        status:
          type: string
          enum: [active, inactive]
      required:
        - id
        - name
        - category
        - regular_expression
        - action
        - action_details
        - meta
        - status
    FirewallTemplateMeta:
      type: object
      description: |
        Free-form presentational metadata managed by the admin (icon, color,
        and any additional keys). Always returned as an object; may be empty.
      properties:
        icon:
          type: string
          description: Icon identifier or URL used by the UI.
          maxLength: 255
        color:
          type: string
          description: Display color (e.g. hex like `#ff0000`).
          maxLength: 32
      additionalProperties: true
    DynamicFieldUpdateRequest:
      type: object
      properties:
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [ip, number, bytes]
      required:
        - type
    DynamicField:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
          nullable: true
        namespace:
          type: string
          readOnly: true
        type:
          type: string
          enum: [ip, number, bytes]
        scope:
          type: string
          enum: [public, private]
          readOnly: true
        values:
          $ref: "#/components/schemas/DynamicFieldValues"
        allowed_plans:
          type: array
          items:
            type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - name
        - type
        - values
    DynamicFieldResponse:
      allOf:
        - $ref: "#/components/schemas/DataWithMessageResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DynamicField"
    DynamicFieldData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/DynamicField"
    DynamicFieldValues:
      type: array
      items:
        $ref: "#/components/schemas/DynamicFieldValue"
    DynamicFieldValue:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        value:
          $ref: "#/components/schemas/DynamicFieldType"
        desc:
          type: string
        created_at:
          type: string
          readOnly: true
    DynamicFieldType:
      oneOf:
        - $ref: "#/components/schemas/DynamicFieldIpType"
        - $ref: "#/components/schemas/DynamicFieldByteType"
        - $ref: "#/components/schemas/DynamicFieldNumberType"
    DynamicFieldIpType:
      title: IP
      type: string
      description: IPv4 or IPv6
    DynamicFieldNumberType:
      title: Number
      type: number
    DynamicFieldByteType:
      title: Byte
      type: string
      format: byte
    MessageResponse:
      type: object
      properties:
        message:
          type: string
  responses:
    UnprocessableEntityError:
      description: The given data was invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: boolean
                default: false
              message:
                type: string
              details:
                type: array
                description: 'List of validation errors in "field: message" format'
                items:
                  type: string
    OK:
      description: Successful
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    Error:
      description: Failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    AccessDenied:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    TrottleRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/MessageResponse"
              - type: object
                properties:
                  status:
                    type: boolean
                    default: false
  securitySchemes:
    UserToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
