                          $ref: "#/components/schemas/AggregatedReportsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /reports/aggregated/charts:
    get:
      summary: Charts of aggregated reports for domains
      description: Show charts of aggregated reports for domains
      operationId: reports.aggregated.charts
      tags: [Aggregated Reports]
      parameters:
        - $ref: "#/components/parameters/CommaSeparatedDomainNames"
        - $ref: "#/components/parameters/AggregatedReportsReprotType"
        - $ref: "#/components/parameters/AggregatedReportsCategoryType"
        - $ref: "#/components/parameters/AggregatedReportsValidPops"
        - $ref: "#/components/parameters/AggregatedReportsValidAsns"
        - $ref: "#/components/parameters/ReportPeriod"
      responses:
        200:
          description: Show charts of aggregated reports for domains
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      charts:
                        $ref: "#/components/schemas/AggregatedReportsChartsResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        404:
          $ref: "#/components/responses/NotFoundError"
  /reports/aggregated/filters:
    get:
      summary: Combined filtering data for aggregated reports
      description: Get the list of combined filtering data for each domain
      operationId: reports.aggregated.filters
      tags: [Aggregated Reports]
      parameters:
        - $ref: "#/components/parameters/CommaSeparatedDomainNames"
      responses:
        200:
          description: Get the list of combined filtering data for each domain
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: "#/components/schemas/AggregatedReportsFilterResponse"
        404:
          $ref: "#/components/responses/NotFoundError"

components:
  parameters:
    Domain:
      name: domain
      in: path
      description: Domain name
      required: true
      schema:
        type: string
        format: hostname
      example: example.com
    HostHeaderWhitelistTargetOrganization:
      name: target_account
      in: path
      description: Target CDN organization ID (UUID) to remove from the Host header whitelist
      required: true
      schema:
        type: string
        format: uuid
    DomainQuery:
      name: domain
      in: query
      description: Domain name or id
      required: false
      schema:
        anyOf:
          - type: string
            format: hostname
            example: example.com
          - type: string
            format: uuid
    MetricExporterId:
      name: metricExporterId
      in: path
      description: Metric Exporter Id
      required: true
      schema:
        type: string
        format: uuid
    MetricExporterQuery:
      name: metric_exporter_id
      in: query
      description: Metric Exporter Id
      required: false
      schema:
        type: string
        format: uuid
    IgnoredPlans:
      name: ignored_plans
      in: query
      description: Comma separaterd plan levels to ignore
      required: false
      schema:
        type: string
      example: "0,1"
    domainClaimId:
      in: path
      name: claim_id
      required: true
      schema:
        type: string
      description: The ID of the domain claim to verify.
    TransportLayerProxyId:
      name: transportLayerProxyId
      in: path
      description: Transport layer proxy id
      required: true
      schema:
        type: string
        format: uuid
    ResponseTransformId:
      name: responseTransform
      in: path
      description: Response transform preset id (UUID)
      required: true
      schema:
        type: string
        format: uuid
    WafPackageId:
      name: wafPackageId
      in: path
      description: Id of a WAF package
      required: true
      schema:
        type: string
      example: comodo
    Id:
      name: id
      in: path
      schema:
        type: string
        format: uuid
      required: true
    AccountFirewallRuleId:
      name: accountFirewallRule
      in: path
      description: ID of an organization-level firewall rule
      required: true
      schema:
        type: string
        format: uuid
    LoadBalancerId:
      name: loadBalancerId
      description: ID of the load balancer
      in: path
      schema:
        type: string
        format: uuid
      required: true
    LoadBalancerPoolId:
      name: loadBalancerPoolId
      description: ID of a pool of the load balancer
      in: path
      schema:
        type: string
        format: uuid
      required: true
    LoadBalancerPoolOriginId:
      name: loadBalancerPoolOriginId
      description: ID of an origin of the pool in the load balancer
      in: path
      schema:
        type: string
        format: uuid
      required: true
    CertificateId:
      name: certificateId
      description: ID of an ssl certificate
      in: path
      schema:
        type: string
        format: uuid
      required: true
    CertificateOrder:
      name: certificateOrder
      description: The ID of the certificate order
      in: path
      schema:
        type: string
        format: uuid
      required: true
    KeepPrivateKey:
      name: keep_private_key
      in: query
      required: false
      description: whether the private key should be retained on VergeCloud servers. If set to false, the private key will be permanently removed, and it will no longer be accessible or viewable. Ensure you store the key securely for future use
      schema:
        type: boolean
        default: true
    PackageId:
      name: packageId
      in: path
      schema:
        type: string
      required: true
    DnsRecordId:
      name: id
      description: ID of the DNS record
      in: path
      schema:
        type: string
        format: uuid
      required: true
    HealthCheckName:
      name: name
      description: Name of the health-check
      in: query
      schema:
        type: string
      required: true
    HealthCheckUpstream:
      name: upstream
      description: Upstream of the health-check monitoring
      in: query
      schema:
        type: string
      required: true
    HealthCheckReportType:
      name: type
      description: Type of reports for the health check
      in: query
      schema:
        type: string
        default: "all"
        enum:
          - all
          - success
          - error
      required: false
    Search:
      name: search
      description: Search term
      in: query
      schema:
        type: string
    OrderBy:
      name: order_by
      in: query
      schema:
        type: string
        enum:
          - priority
          - created_at
    OrderType:
      name: order_type
      in: query
      schema:
        type: string
        enum:
          - desc
          - asc
    Direction:
      name: direction
      description: Set the direction of sorting
      in: query
      schema:
        type: string
        enum:
          - asc
          - desc
    CdnAppSortBy:
      name: sort_by
      in: query
      schema:
        type: string
        enum:
          - rank
          - likes
    PerPage:
      name: per_page
      description: Set how many items returned per page
      in: query
      schema:
        type: integer
    Page:
      name: page
      description: Set the desired page number
      in: query
      schema:
        type: integer
        default: 1
    Name:
      name: name
      description: Set the desired name
      in: query
      schema:
        type: string
    Plans:
      name: plans
      description: >-
        Filter domains by plans. Accepts a single value, comma-separated values,
        or repeated parameters (e.g. plans=1&plans=4).
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: "#/components/schemas/Plan"
    CertificateTypes:
      name: types
      description: Filter certificates by types
      in: query
      schema:
        type: array
        items:
          $ref: "#/components/schemas/CertificateType"
    Statuses:
      name: statuses
      in: query
      description: >-
        Filter domains by statuses. Accepts a single value, comma-separated values,
        or repeated parameters (e.g. statuses=active&statuses=inactive).
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [active, inactive]
    LogForwarderName:
      name: name
      in: query
      description: Filter log forwarders by name
      schema:
        type: string
    ResponseTransformName:
      name: name
      in: query
      description: Filter response transform presets by name (substring match)
      schema:
        type: string
    LogForwarderTypes:
      name: types
      in: query
      description: Filter log forwarders by type
      schema:
        type: array
        items:
          type: string
          enum: [access, event, dns, error, waf]
    MetricExporterTypes:
      name: types
      in: query
      description: Filter metric exporters by type
      schema:
        type: array
        items:
          type: string
          enum: [access, event, dns, error]
    Sort_by:
      name: sort_by
      in: query
      description: Sort domains by a specific field
      schema:
        type: string
        enum: [updated_at, status, name]
    Order:
      name: order
      in: query
      description: Order domains in ascending or descending order
      schema:
        type: string
        enum: [asc, desc]
    AggregatedReport:
      name: aggr_report
      in: query
      description: Fetch only domains which have aggregated reports enabled
      schema:
        type: boolean
    DynamicFieldScope:
      name: scope
      in: query
      schema:
        type: string
        enum: [private, public]
    DynamicFieldType:
      name: type
      in: query
      schema:
        type: string
        enum: [ip, bytes, number]
    DynamicFieldName:
      name: name
      in: query
      schema:
        type: string
    ReportPeriod:
      name: period
      description: Select period -ending now- for report.
      in: query
      schema:
        type: string
        enum: [5m, 1h, 3h, 6h, 12h, 24h, 7d, 30d]
    ReportSince:
      name: since
      in: query
      schema:
        type: string
        format: date-time
        description: Date and time in ISO 8601 UTC format (e.g. 1988-07-11T00:00:00Z).
    ReportUntil:
      name: until
      in: query
      schema:
        type: string
        format: date-time
        description: Date and time in ISO 8601 UTC format (e.g. 1988-07-11T00:00:00Z).
    FilterSubdomain:
      name: "filter[subdomain]"
      in: query
      schema:
        type: string
        pattern: '^[\w@-]+$'
        nullable: true
        description: Select subdomain for report. @ means the root domain.
    type:
      name: type
      description: Set the desired log
      in: query
      schema:
        type: string
        enum: [cdn, waf]
    CategoryId:
      name: category_id
      description: Filter apps by category
      in: query
      schema:
        type: string
        format: uuid
    ApplicationCategory:
      name: application-category
      description: The id of the category
      in: path
      required: true
      schema:
        type: string
    ApplicationCategories:
      name: categories
      in: query
      schema:
        nullable: true
        type: array
        items:
          type: string
    HealthCheck:
      name: healthcheck
      in: path
      schema:
        type: string
        format: uuid
      required: true
    DnsRecordType:
      name: type
      description: Type of a dns record. To filter multiple types separate them using a comma
      in: query
      schema:
        type: string
      example: a,cname,txt
    AggregatedReportsReprotType:
      name: report_type
      description: Type of report
      in: query
      schema:
        type: string
        enum: [traffic, requests]
    AggregatedReportsCategoryType:
      name: category_type
      description: Category of report
      in: query
      schema:
        type: string
        enum: [pop, asn]
    AggregatedReportsValidPops:
      name: pops
      description: Names of a pop sites. To filter multiple pops, separate them using a comma
      in: query
      schema:
        type: string
      example: bom-vlt,dxb-i3d
    AggregatedReportsValidAsns:
      name: asns
      description: Numbers of ASNs. To filter multiple ASNs, separate them using a comma
      in: query
      schema:
        type: string
      example: 1435,7846
    CommaSeparatedDomainNames:
      name: domains
      description: Name of domains. To filter multiple domains separate them using a comma
      in: query
      schema:
        type: string
      example: example1.com,example2.com
  schemas:
    CertificateProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        is_multi:
          type: boolean
        has_wildcard:
          type: boolean
        limit:
          type: integer
        price:
          type: number
          format: float
    CertificateOrderIssueRequest:
      type: object
      properties:
        domains:
          type: array
          items:
            type: object
            properties:
              domain:
                type: string
                format: uuid
              domain_names:
                type: array
                items:
                  type: string
        product_id:
          type: string
          format: uuid
      required:
        - domains
        - product_id
    AccountCertificateOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_id:
          type: string
        status:
          type: string
        domain_names:
          type: array
          items:
            type: string
        product:
          type: string
        errors:
          type: object
          nullable: true
        expiry_date:
          type: string
          format: date-time
        is_revoked:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SavedTrafficsBreakdown:
      type: object
      description: Aggregate breakdown of cache outcomes for a request/traffic section.
      properties:
        saved:
          type: number
          format: double
          description: Value served from cache (hit).
        bypass:
          type: number
          format: double
          description: Value served as bypass.
        miss:
          type: number
          format: double
          description: Computed as max(0, total - saved - bypass).
        total:
          type: number
          format: double
          description: Total value (for the charts section, equals miss + saved + bypass).
      required: [saved, bypass, miss, total]
    SavedTrafficsCharts:
      type: object
      properties:
        request:
          $ref: "#/components/schemas/SavedTrafficsBreakdown"
        traffic:
          $ref: "#/components/schemas/SavedTrafficsBreakdown"
    SavedTrafficsStatistics:
      type: object
      properties:
        request:
          $ref: "#/components/schemas/SavedTrafficsBreakdown"
        traffic:
          $ref: "#/components/schemas/SavedTrafficsBreakdown"
    SavedTrafficsData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                statistics:
                  $ref: "#/components/schemas/SavedTrafficsStatistics"
                charts:
                  $ref: "#/components/schemas/SavedTrafficsCharts"
    TransportLayerProxyTrafficCharts:
      type: object
      description: TLP traffic time-series flattened into a list of points.
      properties:
        traffics:
          type: array
          items:
            $ref: "#/components/schemas/TransportLayerProxyTrafficPoint"
    TransportLayerProxyTrafficPoint:
      type: object
      properties:
        date:
          type: string
          format: date-time
          description: The bucket timestamp.
        bytes_out:
          type: integer
          format: int64
          description: Bytes sent from the proxy in the bucket.
        bytes_in:
          type: integer
          format: int64
          description: Bytes received by the proxy in the bucket.
        connections:
          type: integer
          format: int64
          description: Number of connections in the bucket.
        total:
          type: integer
          format: int64
          description: Computed as bytes_out + bytes_in.
      required: [date, bytes_out, bytes_in, connections, total]
    TransportLayerProxyTrafficStatistics:
      type: object
      properties:
        traffics:
          type: object
          properties:
            bytes_out:
              type: integer
              format: int64
              description: Sum of bytes_out across the period.
            bytes_in:
              type: integer
              format: int64
              description: Sum of bytes_in across the period.
            connections:
              type: integer
              format: int64
              description: Sum of connections across the period.
            top:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of the bucket with the highest total traffic.
            total:
              type: integer
              format: int64
              description: bytes_out + bytes_in across the period.
          required: [bytes_out, bytes_in, connections, total]
    TrafficChartPoint:
      type: object
      description: A single flattened data point in a traffic time-series.
      properties:
        date:
          type: string
          format: date-time
          description: The bucket timestamp.
        total:
          type: integer
          format: int64
          description: Total value for the bucket.
        saved:
          type: integer
          format: int64
          description: Value served from cache (hit).
        bypass:
          type: integer
          format: int64
          description: Value served as bypass.
        miss:
          type: integer
          format: int64
          description: Computed as max(0, total - saved - bypass).
      required: [date, total, saved, bypass, miss]
    TrafficCharts:
      type: object
      description: |
        Time-series for requests and traffic, flattened into a list of points.
        Each point includes the bucket date and the corresponding values.
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/TrafficChartPoint"
        traffics:
          type: array
          items:
            $ref: "#/components/schemas/TrafficChartPoint"
    TrafficStatistics:
      type: object
      properties:
        traffics:
          type: object
          properties:
            saved:
              type: integer
              format: int64
            bypass:
              type: integer
              format: int64
            top:
              type: string
              format: date-time
            total:
              type: integer
              format: int64
          required: [saved, top, total]
        requests:
          type: object
          properties:
            saved:
              type: integer
              format: int64
            bypass:
              type: integer
              format: int64
            top:
              type: string
              format: date-time
            total:
              type: integer
              format: int64
          required: [saved, top, total]
    TransportLayerProxyTrafficsData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              type: object
              properties:
                statistics:
                  $ref: "#/components/schemas/TransportLayerProxyTrafficStatistics"
                charts:
                  $ref: "#/components/schemas/TransportLayerProxyTrafficCharts"
    TrafficsData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Traffics"
    CountryStatistics:
      type: object
      properties:
        country:
          type: string
          description: The name of the country
        requests:
          type: integer
          format: int64
          description: The number of requests from the country
        traffics:
          type: integer
          format: int64
          description: The amount of traffic from the country
    CountryRequestChart:
      type: object
      example:
        IRN:
          fillKey: 4
          name: Iran (Islamic Republic of)
          value: 12456789
        description: A dictionay which maps country codes to fill and value
      properties:
        fillKey:
          type: integer
          format: int64
          description: The fill key for the country
        name:
          type: string
          description: The name of the country
        value:
          type: integer
          format: int64
          description: The number of requests from the country
    CountryTrafficChart:
      type: object
      properties:
        fillKey:
          type: integer
          format: int64
          description: The fill key for the country
        name:
          type: string
          description: The name of the country
        value:
          type: integer
          format: int64
          description: The amount of traffic from the country
    CountryList:
      type: object
      properties:
        country:
          type: string
          description: The name of the country
        code:
          type: string
          description: The 2-letter country code
        requests:
          type: integer
          format: int64
          description: The number of requests from the country
        traffics:
          type: integer
          format: int64
          description: The amount of traffic from the country
    MapTrafficsData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/TrafficsMap"
    VisitorsStatistics:
      type: object
      properties:
        visitors:
          type: object
          properties:
            top_visitors:
              type: string
              format: date-time
            total_visitors:
              type: integer
              format: int64
          required: [top_visitors, total_visitors]
    VisitorsCharts:
      type: object
      description: Time-series of visitors flattened into a list of {date, total} points.
      properties:
        visitors:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
                format: date-time
                description: The bucket timestamp.
              total:
                type: integer
                format: int64
                description: Number of unique visitors in the bucket.
            required: [date, total]
    Traffics:
      type: object
      properties:
        statistics:
          $ref: "#/components/schemas/TrafficStatistics"
        charts:
          $ref: "#/components/schemas/TrafficCharts"
    TrafficsMap:
      type: object
      properties:
        statistics:
          deprecated: true
          type: array
          items:
            $ref: "#/components/schemas/CountryStatistics"
        charts:
          type: object
          properties:
            requests:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/CountryRequestChart"
            traffics:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/CountryTrafficChart"
        lists:
          type: array
          items:
            $ref: "#/components/schemas/CountryList"
    Visitors:
      type: object
      properties:
        statistics:
          $ref: "#/components/schemas/VisitorsStatistics"
        charts:
          $ref: "#/components/schemas/VisitorsCharts"
    VisitorsData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Visitors"
    HighRequestedIp:
      type: object
      properties:
        ip:
          anyOf:
            - type: string
              format: ipv4
            - type: string
              format: ipv6
        request_count:
          type: integer
          format: int64
    ResponseTime:
      type: object
      description: Server-side response time time-series flattened into {date, total} points.
      properties:
        charts:
          type: object
          properties:
            response_times:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date-time
                    description: The bucket timestamp.
                  total:
                    type: number
                    format: double
                    description: Average response time in seconds for the bucket.
                required: [date, total]
    ResponseTimeData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ResponseTime"
    StatusCodeReport:
      type: object
      properties:
        statistics:
          type: object
          properties:
            status_codes:
              type: object
              properties:
                2xx_sum:
                  type: integer
                  format: int64
                3xx_sum:
                  type: integer
                  format: int64
                4xx_sum:
                  type: integer
                  format: int64
                5xx_sum:
                  type: integer
                  format: int64
        charts:
          type: object
          description: |
            Status code time-series flattened into a list of points keyed by
            response class (2xx/3xx/4xx/5xx).
          properties:
            status_code:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                    format: date-time
                    description: The bucket timestamp.
                  2xx:
                    type: integer
                    format: int64
                    description: Number of 2xx responses in the bucket.
                  3xx:
                    type: integer
                    format: int64
                    description: Number of 3xx responses in the bucket.
                  4xx:
                    type: integer
                    format: int64
                    description: Number of 4xx responses in the bucket.
                  5xx:
                    type: integer
                    format: int64
                    description: Number of 5xx responses in the bucket.
                required: [date]
    StatusCodeReportData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StatusCodeReport"
    StatusCodeSummary:
      type: object
      properties:
        statistics:
          type: object
          deprecated: true
        charts:
          type: object
          properties:
            status_code:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  y:
                    type: integer
    StatusCodeSummaryData:
      allOf:
        - $ref: "#/components/schemas/DataResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StatusCodeSummary"
    ErrorLog:
      type: object
      properties:
        name:
          type: string
          description: The error message
        count:
          type: integer
          format: int64
          description: The error's count
        upstreams:
          type: array
