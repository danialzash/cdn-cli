    HostHeaderWhitelistStoreRequest:
      type: object
      required: [target_account]
      properties:
        target_account:
          type: string
          format: uuid
          description: >-
            Target CDN organization to allow using this domain as `Host`. Must differ from this domain's owner organization and
            must be a valid organization identifier. Ignored (with `422` on `domain`) if the domain is globally
            whitelisted.
    HostHeaderWhitelistSettingsRequest:
      type: object
      required: [global]
      properties:
        global:
          type: boolean
          description: If true, this domain is added to the global Host allowlist. If false, the global entry is removed.
    HostHeaderWhitelistData:
      type: object
      required: [target_accounts, globally_whitelisted]
      properties:
        target_accounts:
          type: array
          description: >-
            When `globally_whitelisted` is true, this list is always empty. Otherwise, sorted list of target CDN
            organization UUIDs that may use this domain (or its registrable root) as the HTTP `Host` header.
          items:
            type: string
            format: uuid
        globally_whitelisted:
          type: boolean
          description: >-
            If true, the domain is on the global allowlist; any organization may use it as HTTP `Host`, and
            per-organization whitelists are not applied for access checks.
