        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    SSLProblem:
      type: object
      properties:
        type:
          readOnly: true
          type: string
          format: uri
          example: "urn:ietf:params:acme:error:malformed"
          description: A URI reference that identifies the problem type.
        detail:
          readOnly: true
          type: string
          example: "Some of the identifiers requested were rejected"
          description: A human-readable explanation specific to this occurrence of the problem.
        status:
          readOnly: true
          type: string
          format: string
          description: The HTTP status code generated by the origin server for this occurrence of the problem
        subproblems:
          readOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Subproblem"
    Subproblem:
      type: object
      properties:
        type:
          readOnly: true
          type: string
          example: "urn:ietf:params:acme:error:malformed"
          description: A reference that identifies the problem type.
        detail:
          readOnly: true
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: 'Invalid underscore in DNS name "_example.org"'
        identifier:
          readOnly: true
          type: object
          description: A hint that an operation would succeed if that identifier were omitted
          properties:
            type:
              readOnly: true
              type: string
              example: "_example.org"
            value:
              readOnly: true
              type: string
              example: "dns"
    CertificateOrder:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        order_id:
          type: string
          format: int32
          readOnly: true
        status:
          type: string
          readOnly: true
          enum:
            [
              unprocessed,
              pending,
              processing,
              ready,
              valid,
              invalid,
              canceled,
              terminated,
              killed,
            ]
          description: |
            - `unprocessed` - Order is in the process queue
            - `canceled` - Order is canceled in favor of a new one with updated subject names
            - `pending` - Authorization Challenges are set, Validating authorization challenges...
            - `ready` - Challenges are validated, ready to issue the certificate
            - `processing` - Issuing Certificate...
            - `valid` - Certificate is issued successfully, this is the final stage
            - `invalid` - An Error Occurred, this order cannot proceed anymore, a new order will be created automatically
            - `terminated` - An Unknown Error occurred, this order cannot proceed anymore, a new order will be created automatically
            - `killed` - Order failed despite many retries, will not proceed anymore nor retry, needs manual intervention
        domain_names:
          type: array
          readOnly: true
          items:
            type: string
        errors:
          readOnly: true
          $ref: "#/components/schemas/SSLProblem"
        expiry_date:
          description: "Expired order is treated as invalid order"
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
    Ssl:
      type: object
      properties:
        fingerprint_status:
          type: boolean
          description: Whether Domain is using fingerprint or not
        ssl_status:
          type: boolean
          description: Whether Domain is using ssl module or not
        certificate_mode:
          readOnly: true
          type: string
          enum: ["managed", "custom"]
          description: "Indicates certificate is managed by verge, or its up to the user"
        tls_version:
          type: string
          description: Minimum version of TLS. Empty ('') means default.
          enum: ["", "TLSv1", "TLSv1.1", "TLSv1.2", "TLSv1.3"]
        hsts_status:
          type: boolean
          description: Whether HSTS is enabled
        quic_status:
          type: boolean
          description: Whether QUIC is enabled
        verify_sni:
          type: boolean
          description: When true, verify that the TLS SNI matches the requested hostname
        hsts_max_age:
          type: string
          enum: ["1mo", "2mo", "3mo", "4mo", "5mo", "6mo", "12mo", "24mo"]
          description: HSTS max age directive
        hsts_subdomain:
          type: boolean
        hsts_preload:
          type: boolean
        https_redirect:
          type: boolean
        replace_http:
          type: boolean
          description: Replace HTTP with HTTPs in HTML and JS sources
        certificate_key_type:
          type: string
          enum:
            - "rsa"
            - "ec"
        certificates:
          readOnly: true
          type: array
          items:
            $ref: "#/components/schemas/Certificate"
        orders:
          description: returns all "certificate orders" since the last invalid or canceled order
          readOnly: true
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/CertificateOrder"
    SslResponse:
      allOf:
        - $ref: "#/components/schemas/DataWithMessageResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Ssl"
