  # Response transforms
  /response-transforms/{domain}:
    parameters:
      - $ref: "#/components/parameters/Domain"
    get:
      summary: List response transform presets for the domain
      description: |
        Each preset has a unique `name` and ordered `transforms` (condition + actions).
      tags: [Response Transforms]
      operationId: response_transforms.index
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/ResponseTransformName"
      responses:
        200:
          description: Paginated list of response transform presets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ResponseTransform"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        403:
          $ref: "#/components/responses/AccessDenied"
        404:
          $ref: "#/components/responses/NotFoundError"
    post:
      summary: Create a response transform preset
      description: |
        `condition` must be a valid Wireshark-like filter.
      tags: [Response Transforms]
      operationId: response_transforms.store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponseTransformStore"
      responses:
        201:
          description: Preset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseTransformResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        403:
          $ref: "#/components/responses/AccessDenied"
        404:
          $ref: "#/components/responses/NotFoundError"
        405:
          description: Filter uses fields not allowed for the domain plan
          content:
            application/json:
              schema:
                type: object
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
  /response-transforms/{domain}/{responseTransform}:
    parameters:
      - $ref: "#/components/parameters/Domain"
      - $ref: "#/components/parameters/ResponseTransformId"
    get:
      summary: Get one response transform preset by id
      tags: [Response Transforms]
      operationId: response_transforms.show
      responses:
        200:
          description: Preset details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseTransformResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        403:
          $ref: "#/components/responses/AccessDenied"
        404:
          $ref: "#/components/responses/NotFoundError"
    patch:
      summary: Update a response transform preset
      description: |
        Omit `transforms` to change only name or sequence. When `transforms` is sent, each `condition` is re-validated.
      tags: [Response Transforms]
      operationId: response_transforms.update
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResponseTransformUpdate"
      responses:
        200:
          description: Preset updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseTransformResponse"
        401:
          $ref: "#/components/responses/UnauthorizedError"
        403:
          $ref: "#/components/responses/AccessDenied"
        404:
          $ref: "#/components/responses/NotFoundError"
        405:
          description: Filter uses fields not allowed for the domain plan
          content:
            application/json:
              schema:
                type: object
        422:
          $ref: "#/components/responses/UnprocessableEntityError"
    delete:
      summary: Delete a response transform preset
      tags: [Response Transforms]
      operationId: response_transforms.destroy
      responses:
        200:
          $ref: "#/components/responses/OK"
          description: Preset deleted; proxy config sync is triggered
        401:
          $ref: "#/components/responses/UnauthorizedError"
        403:
          $ref: "#/components/responses/AccessDenied"
        404:
          $ref: "#/components/responses/NotFoundError"
