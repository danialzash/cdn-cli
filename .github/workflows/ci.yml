name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o bin/verge ./cmd/verge
